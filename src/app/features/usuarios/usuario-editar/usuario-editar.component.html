<div class="page internal-page">
  <a routerLink="/usuarios" class="back">← Volver a administrar usuarios</a>
  <h1>Editar usuario</h1>
  @if (loading) {
    <p>Cargando...</p>
  } @else {
    <div class="form-card">
      @if (errorMsg) {
        <p class="error-msg" role="alert">{{ errorMsg }}</p>
      }
      <form (ngSubmit)="guardar()">
        <div class="form-row">
          <label>Nombre para mostrar</label>
          <input [(ngModel)]="form.nombre_usuario" name="nombre_usuario" placeholder="Ej. María González" />
          <p class="field-hint">Opcional. Vacío = solo se muestra el nombre de usuario en la app.</p>
        </div>
        <div class="form-row">
          <label>Nombre de usuario *</label>
          <input [(ngModel)]="form.username" name="username" required />
        </div>
        <div class="form-row">
          <label>Email *</label>
          <input [(ngModel)]="form.email" name="email" type="email" required />
        </div>
        <div class="form-row">
          <label>Contraseña (dejar vacío para no cambiar)</label>
          <input [(ngModel)]="form.password" name="password" type="password" />
        </div>
        <div class="form-row">
          <label>Rol</label>
          <select [(ngModel)]="form.rol" name="rol">
            <option value="vendedor">Vendedor</option>
            <option value="administrador">Administrador</option>
          </select>
        </div>
        <div class="form-row checkbox-row">
          <label class="checkbox-label">
            <input type="checkbox" [(ngModel)]="form.activo" name="activo" class="checkbox-input" />
            <span class="checkbox-custom"></span>
            <span class="checkbox-text">Activo</span>
          </label>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-cancel" (click)="cancelar()">Cancelar</button>
          <button type="submit" class="btn-primary" [disabled]="saving">{{ saving ? 'Guardando...' : 'Guardar' }}</button>
        </div>
      </form>
    </div>
  }
</div>

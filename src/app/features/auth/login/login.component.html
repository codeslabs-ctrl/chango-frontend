<div class="login-page">
  <div class="login-container">
    <div class="login-split">
      <aside class="login-hero">
        <div class="login-hero-inner">
          <img src="/assets/chango-izq.png" alt="" class="login-hero-image" />
        </div>
        <div class="login-hero-overlay">
          <h2 class="login-hero-welcome">
            Bienvenido a <span class="login-brand-demo">Santa Bárbara </span><span class="login-brand-stock">Chango</span>
          </h2>
          <p class="login-hero-tagline">Plataforma para la gestión de inventario, ventas y almacenes.</p>
        </div>
      </aside>
      <div class="login-form-panel">
        <div class="login-card">
          <div class="login-card-header">
            <img src="/assets/logo-chango.png" alt="Santa Bárbara Chango" class="login-card-logo" />
          </div>
          <h1 class="login-heading">Iniciar sesión</h1>
          <p class="login-instruction">Ingresa tus credenciales para acceder a tu cuenta.</p>
          <form (ngSubmit)="onSubmit()">
            <div class="form-row login-input-row">
              <label for="username">Usuario</label>
              <div class="login-input-wrap">
                <span class="login-input-icon" aria-hidden="true">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </span>
                <input
                  id="username"
                  type="text"
                  [(ngModel)]="username"
                  name="username"
                  placeholder="Ingresa tu usuario"
                  autocomplete="username"
                  [disabled]="loading"
                />
              </div>
            </div>
            <div class="form-row login-input-row">
              <label for="password">Contraseña</label>
              <div class="login-input-wrap password-wrap">
                <span class="login-input-icon" aria-hidden="true">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </span>
                <input
                  id="password"
                  [type]="showPassword ? 'text' : 'password'"
                  [(ngModel)]="password"
                  name="password"
                  placeholder="Ingresa tu contraseña"
                  autocomplete="current-password"
                  [disabled]="loading"
                />
                <button
                  type="button"
                  class="password-toggle"
                  (click)="showPassword = !showPassword"
                  [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Ver contraseña'"
                  tabindex="-1"
                >
                  @if (showPassword) {
                    <svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                  } @else {
                    <svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  }
                </button>
              </div>
            </div>
            @if (error) {
              <div class="login-error">{{ error }}</div>
            }
            <button type="submit" class="btn-primary login-btn-entrar" [disabled]="loading">
              <span>{{ loading ? 'Entrando...' : 'Iniciar sesión' }}</span>
              <svg class="login-btn-arrow" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </button>
            <a routerLink="/recuperar-contraseña" class="login-forgot">¿Olvidaste tu contraseña?</a>
          </form>
          <p class="login-copyright">
            © <a href="https://codes-labs.com" target="_blank" rel="noopener noreferrer">Codes-Labs</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
